<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Sole Ledger"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Sole Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--sur:#111;--bor:#1e1e1e;--bor2:#2a2a2a;
  --txt:#f5f5f0;--mut:#555;--dim:#333;
  --acc:#d4ff6b;--grn:#22c55e;--red:#ef4444;--ora:#f97316;--yel:#eab308;--pur:#a78bfa;--blu:#60a5fa;
  --st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Mono',monospace;overflow:hidden}
body{display:flex;flex-direction:column}
#hdr{background:var(--bg);border-bottom:1px solid var(--bor);padding:calc(10px + var(--st)) 16px 0;flex-shrink:0}
#logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--acc);padding-bottom:10px}
#nav{display:flex;overflow-x:auto}
.nb{background:none;border:none;border-bottom:2px solid transparent;color:var(--mut);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:8px 12px 6px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.nb.act{color:var(--txt);border-bottom-color:var(--acc)}
#tkw{background:#0f0f0f;border-bottom:1px solid var(--bor);padding:6px 0;overflow:hidden;flex-shrink:0;display:none}
#tk{display:inline-block;white-space:nowrap;animation:tk 25s linear infinite}
@keyframes tk{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{font-size:10px;color:var(--mut);margin-right:40px}
#con{flex:1;overflow-y:auto;padding:14px 14px calc(80px + var(--sb));-webkit-overflow-scrolling:touch}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.sc{background:var(--sur);border:1px solid var(--bor);border-radius:3px;padding:12px}
.sl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.sv{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;line-height:1}
.ss{font-size:9px;color:var(--dim);margin-top:3px}
.hl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--mut);margin-bottom:10px}
.ir{background:var(--sur);border:1px solid var(--bor);border-radius:3px;padding:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ie{font-size:26px;width:34px;text-align:center;flex-shrink:0}
.ii{flex:1;min-width:0}
.in{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.im{font-size:9px;color:var(--mut);margin-top:2px}
.irt{text-align:right;flex-shrink:0}
.iroi{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;margin-top:2px}
.bg{display:inline-block;padding:2px 6px;border-radius:2px;font-size:8px;letter-spacing:1px;text-transform:uppercase}
.bgs{background:#1a2a1a;color:var(--grn);border:1px solid #22c55e33}
.bgv{background:#1a1a2a;color:#818cf8;border:1px solid #6366f133}
.bgc-sneakers{display:inline-block;padding:1px 5px;border-radius:2px;font-size:8px;background:#1a1a2a;color:#60a5fa;border:1px solid #60a5fa33;margin-left:4px}
.bgc-vetements{display:inline-block;padding:1px 5px;border-radius:2px;font-size:8px;background:#2a1a2a;color:#c084fc;border:1px solid #c084fc33;margin-left:4px}
.bgc-accessoires{display:inline-block;padding:1px 5px;border-radius:2px;font-size:8px;background:#2a1a1a;color:#fb923c;border:1px solid #fb923c33;margin-left:4px}
.bp{background:var(--acc);color:var(--bg);border:none;padding:12px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:500;border-radius:2px;width:100%;margin-top:4px}
.bg2{background:none;border:1px solid var(--dim);color:#aaa;padding:10px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;border-radius:2px;width:100%}
.bsl{background:none;border:1px solid var(--dim);color:#aaa;padding:4px 8px;font-family:'DM Mono',monospace;font-size:8px;cursor:pointer;border-radius:2px}
.bdl{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:0 3px}
#fab{position:fixed;bottom:calc(20px + var(--sb));right:16px;width:50px;height:50px;border-radius:50%;background:var(--acc);border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(212,255,107,.3);display:flex;align-items:center;justify-content:center;z-index:50}
.fs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fb{background:none;border:1px solid var(--bor);color:var(--mut);padding:5px 10px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;border-radius:2px}
.fb.act{border-color:var(--acc);color:var(--acc)}
.ss2{background:var(--sur);border:1px solid var(--bor);color:var(--txt);padding:5px 8px;font-family:'DM Mono',monospace;font-size:8px;border-radius:2px;margin-left:auto}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:flex-end;z-index:100}
.mo{background:#111;border-top:1px solid var(--bor2);border-radius:16px 16px 0 0;padding:20px 16px calc(20px + var(--sb));width:100%;max-height:90vh;overflow-y:auto}
.mt{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--acc);margin-bottom:16px}
.fl{margin-bottom:12px}
.fll{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.inp{background:#0f0f0f;border:1px solid var(--bor2);color:var(--txt);padding:11px;font-family:'DM Mono',monospace;font-size:12px;width:100%;border-radius:3px;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--acc)}
select.inp{cursor:pointer}
.eg{display:flex;gap:6px;flex-wrap:wrap}
.eb{background:none;border:1px solid var(--bor);border-radius:6px;padding:6px 10px;font-size:20px;cursor:pointer}
.eb.sel{border-color:var(--acc);background:#1a1a00}
.cg{display:flex;gap:6px}
.cb{flex:1;background:none;border:1px solid var(--bor);color:var(--mut);padding:9px 4px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;border-radius:3px;text-align:center}
.cb.cs{border-color:#60a5fa;color:#60a5fa;background:#1a1a2a}
.cb.cv{border-color:#c084fc;color:#c084fc;background:#2a1a2a}
.cb.ca{border-color:#fb923c;color:#fb923c;background:#2a1a1a}
.pb{background:#0f0f0f;border:1px solid var(--bor);border-radius:3px;padding:12px;margin-bottom:12px}
.ac{background:var(--sur);border:1px solid var(--bor);border-radius:3px;padding:14px;margin-bottom:10px}
.brow{margin-bottom:10px}
.brh{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px}
.brt{height:4px;background:#1a1a1a;border-radius:2px}
.brf{height:4px;border-radius:2px}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pi{border-left:2px solid;padding-left:10px}
.pl{font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.pv{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.ti2{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tr{font-size:9px;color:var(--dim);width:16px}
.tif{flex:1}
.tn{font-size:10px}
.tm{font-size:8px;color:var(--mut)}
.troi{font-family:'Bebas Neue',sans-serif;font-size:18px}
.rb{height:3px;background:#1a1a1a;border-radius:2px;margin-top:4px}
.rf{height:3px;border-radius:2px}
.emp{text-align:center;padding:40px 16px;color:var(--mut)}
.slw{margin-bottom:16px}
.slh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sll{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);display:flex;align-items:center;gap:6px}
.slv{font-family:'Bebas Neue',sans-serif;font-size:18px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:#2a2a2a;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--acc);cursor:pointer}
.alb{background:#2a1a00;border:1px solid #f9731633;border-radius:3px;padding:12px;margin-bottom:10px}
.alt{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--ora);margin-bottom:5px}
.alx{font-size:10px;color:#aaa;line-height:1.6}
.hr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bor)}
.hr:last-child{border-bottom:none}
.hm{font-size:9px;color:var(--mut);width:36px}
.hbw{flex:1}
.hb{height:5px;border-radius:3px}
.ha{font-family:'Bebas Neue',sans-serif;font-size:14px;width:60px;text-align:right}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333}
</style>
</head>
<body>
<div id="hdr">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div id="logo">SOLE LEDGER</div>
    <div style="font-size:8px;color:var(--mut)">v3.0</div>
  </div>
  <div id="nav">
    <button class="nb act" onclick="sw('dashboard')">Dashboard</button>
    <button class="nb" onclick="sw('stock')">Stock</button>
    <button class="nb" onclick="sw('analytics')">Analytics</button>
    <button class="nb" onclick="sw('finances')">Finances</button>
  </div>
</div>
<div id="tkw"><div id="tk"></div></div>
<div id="con"></div>
<button id="fab" onclick="openAdd()">+</button>

<div class="ov" id="modal-add" style="display:none" onclick="closeAdd()">
<div class="mo" onclick="event.stopPropagation()">
  <div class="mt">Nouvel article</div>
  <div class="fl"><div class="fll">Categorie</div><div class="cg" id="cg"></div></div>
  <div class="fl"><div class="fll">Emoji</div><div class="eg" id="eg"></div></div>
  <div class="fl"><div class="fll">Nom *</div><input class="inp" id="fn" placeholder="Nike Dunk Low..." type="text"/></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div class="fl"><div class="fll" id="fsl">Pointure</div><input class="inp" id="fsz" placeholder="43" type="text"/></div>
    <div class="fl"><div class="fll">Prix achat *</div><input class="inp" id="fb" placeholder="110" type="number" inputmode="decimal"/></div>
  </div>
  <div class="fl"><div class="fll">Date achat</div><input class="inp" id="fd" type="date"/></div>
  <div class="fl"><div class="fll">Plateforme</div>
    <select class="inp" id="fp">
      <option value="">-- selectionner --</option>
      <option>StockX</option><option>GOAT</option><option>Vinted</option><option>Depop</option>
      <option>Vestiaire</option><option>Instagram</option><option>Leboncoin</option><option>Nike SNKRS</option><option>Retail</option><option>Autre</option>
    </select>
  </div>
  <div class="fl"><div class="fll">Notes</div><input class="inp" id="fno" placeholder="OG box, deadstock..." type="text"/></div>
  <button class="bp" onclick="addItem()">Ajouter au stock</button>
  <div style="height:8px"></div>
  <button class="bg2" onclick="closeAdd()">Annuler</button>
</div>
</div>

<div class="ov" id="modal-sell" style="display:none" onclick="closeSell()">
<div class="mo" onclick="event.stopPropagation()">
  <div class="mt">Marquer vendu</div>
  <div id="sh" style="font-size:11px;color:var(--mut);margin-bottom:16px"></div>
  <div class="fl"><div class="fll">Prix de vente *</div><input class="inp" id="sp" placeholder="180" type="number" inputmode="decimal" oninput="upPrev()"/></div>
  <div class="fl"><div class="fll">Frais plateforme</div><input class="inp" id="sf" placeholder="0" type="number" inputmode="decimal" oninput="upPrev()"/></div>
  <div class="fl"><div class="fll">Date de vente</div><input class="inp" id="sd" type="date"/></div>
  <div class="fl"><div class="fll">Plateforme</div>
    <select class="inp" id="spl">
      <option value="">-- selectionner --</option>
      <option>StockX</option><option>GOAT</option><option>Vinted</option><option>Depop</option>
      <option>Vestiaire</option><option>Instagram</option><option>Leboncoin</option><option>Autre</option>
    </select>
  </div>
  <div class="pb" id="sprev" style="display:none">
    <div style="font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Apercu</div>
    <div style="display:flex;gap:20px">
      <div><div style="font-size:8px;color:var(--mut)">PROFIT NET</div><div id="pp" style="font-family:'Bebas Neue',sans-serif;font-size:20px"></div></div>
      <div><div style="font-size:8px;color:var(--mut)">ROI</div><div id="pr" style="font-family:'Bebas Neue',sans-serif;font-size:20px"></div></div>
    </div>
  </div>
  <button class="bp" onclick="confSell()">Confirmer la vente</button>
  <div style="height:8px"></div>
  <button class="bg2" onclick="closeSell()">Annuler</button>
</div>
</div>

<script>
var EC = {
  sneakers:['👟','🔵','⚪','🐼','🏀','🌿','🔴','⚫','🟡','💎','🦅','🔥'],
  vetements:['👕','👖','🧥','🧣','🧤','👗','🩱','🧢','👔','🩳'],
  accessoires:['👜','🎒','💍','⌚','🕶️','👒','🧦','💼','📿']
};
var MONTHS = ['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'];
var MLONG = ['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];

var inv = [];
var view = 'dashboard';
var filt = 'all';
var cfilt = 'all';
var srt = 'date';
var stgt = null;
var emoji = '👟';
var cat = 'sneakers';

function loadInv() {
  try { var r = localStorage.getItem('slv4'); if(r) inv = JSON.parse(r); } catch(e){ inv=[]; }
  if(!inv || inv.length === 0) {
    inv = [
      {id:1,name:'Nike Dunk Low Panda',size:'43',cat:'sneakers',buy:110,sell:null,plat:'StockX',bd:'2025-01-15',sd:null,st:'stock',fees:0,notes:'',img:'🐼'},
      {id:2,name:'Jordan 1 Retro High OG',size:'42',cat:'sneakers',buy:185,sell:310,plat:'Vinted',bd:'2025-01-08',sd:'2025-02-01',st:'vendu',fees:12,notes:'',img:'🏀'},
      {id:3,name:'Yeezy 350 V2 Zebra',size:'44',cat:'sneakers',buy:220,sell:280,plat:'GOAT',bd:'2025-02-10',sd:'2025-02-28',st:'vendu',fees:22,notes:'',img:'🌿'},
      {id:4,name:'Supreme Box Logo Hoodie',size:'L',cat:'vetements',buy:180,sell:null,plat:'',bd:'2025-03-01',sd:null,st:'stock',fees:0,notes:'',img:'👕'},
      {id:5,name:'Air Force 1 07',size:'43',cat:'sneakers',buy:90,sell:130,plat:'Depop',bd:'2025-02-20',sd:'2025-03-10',st:'vendu',fees:8,notes:'',img:'⚪'},
      {id:6,name:'Stone Island Jacket',size:'M',cat:'vetements',buy:320,sell:480,plat:'Vinted',bd:'2025-01-20',sd:'2025-02-15',st:'vendu',fees:18,notes:'',img:'🧥'}
    ];
    saveInv();
  }
}
function saveInv(){ try{ localStorage.setItem('slv4',JSON.stringify(inv)); }catch(e){} }
function loadRep(){ try{ var r=localStorage.getItem('slrep'); if(r) return JSON.parse(r); }catch(e){} return {stock:30,livret:20,moi:50}; }
function saveRep(r){ try{ localStorage.setItem('slrep',JSON.stringify(r)); }catch(e){} }

function E(n){ return Math.round(Number(n)) + ' EUR'; }
function rc(r){ if(r>=30) return 'var(--grn)'; if(r>=10) return 'var(--yel)'; if(r>=0) return 'var(--ora)'; return 'var(--red)'; }
function dif(d1,d2){ var a=new Date(d1),b=d2?new Date(d2):new Date(); return Math.max(0,Math.round((b-a)/86400000)); }
function td(){ return new Date().toISOString().split('T')[0]; }
function roi(i){ if(i.st!=='vendu') return null; return ((i.sell-i.buy-i.fees)/i.buy)*100; }
function prof(i){ if(i.st!=='vendu') return null; return i.sell-i.buy-i.fees; }
function cbadge(c){ return '<span class="bgc-'+(c||'sneakers')+'">'+(c==='vetements'?'Vet':c==='accessoires'?'Acc':'Snk')+'</span>'; }

function stats(){
  var sold=inv.filter(function(i){return i.st==='vendu';}),
      stock=inv.filter(function(i){return i.st==='stock';});
  var rev=0,cos=0,fee=0,sv=0,td2=0;
  sold.forEach(function(i){rev+=Number(i.sell);cos+=Number(i.buy);fee+=Number(i.fees);td2+=dif(i.bd,i.sd);});
  stock.forEach(function(i){sv+=Number(i.buy);});
  var pft=rev-cos-fee, r=cos>0?(pft/cos)*100:0, avg=sold.length>0?td2/sold.length:0;
  return {rev:rev,pft:pft,roi:r,avg:avg,fee:fee,sv:sv,cos:cos,ns:sold.length,nst:stock.length};
}

function sw(v){
  view=v;
  var bs=document.querySelectorAll('.nb'),vs=['dashboard','stock','analytics','finances'];
  for(var i=0;i<bs.length;i++) bs[i].classList.toggle('act',vs[i]===v);
  render();
}

function ticker(){
  var sold=inv.filter(function(i){return i.st==='vendu';});
  var tw=document.getElementById('tkw');
  if(!sold.length){tw.style.display='none';return;}
  tw.style.display='block';
  var h=sold.concat(sold).map(function(i){
    var r=roi(i),p=prof(i);
    return '<span class="ti"><span style="color:var(--acc)">'+i.img+' '+i.name+'</span> -- <span style="color:'+rc(r)+'">+'+r.toFixed(0)+'% ROI</span> -- <span style="color:var(--grn)">+'+E(p)+'</span></span>';
  });
  document.getElementById('tk').innerHTML=h.join('');
}

function render(){
  ticker();
  var el=document.getElementById('con');
  if(view==='dashboard') el.innerHTML=rDash();
  else if(view==='stock') el.innerHTML=rStock();
  else if(view==='analytics') el.innerHTML=rAna();
  else el.innerHTML=rFin();
  if(view==='analytics') drawCharts();
}

function rDash(){
  var s=stats();
  var h='<div class="sg">';
  var cards=[
    {l:'Profit net',v:(s.pft>=0?'+':'')+E(s.pft),s:'apres '+E(s.fee)+' frais',c:s.pft>=0?'var(--acc)':'var(--red)'},
    {l:'ROI moyen',v:s.roi.toFixed(1)+'%',s:s.ns+' vente(s)',c:rc(s.roi)},
    {l:'Capital stock',v:E(s.sv),s:s.nst+' article(s)',c:'var(--txt)'},
    {l:'Rotation moy.',v:Math.round(s.avg)+'j',s:'achat > vente',c:'var(--pur)'},
    {l:'Revenus bruts',v:E(s.rev),s:'total ventes',c:'var(--blu)'},
    {l:'Investi total',v:E(s.cos+s.sv),s:'tout confondu',c:'var(--txt)'}
  ];
  cards.forEach(function(c){h+='<div class="sc"><div class="sl">'+c.l+'</div><div class="sv" style="color:'+c.c+'">'+c.v+'</div><div class="ss">'+c.s+'</div></div>';});
  h+='</div><div class="hl">Activite recente</div>';
  var rec=inv.slice().sort(function(a,b){return new Date(b.bd)-new Date(a.bd);}).slice(0,5);
  if(!rec.length) h+='<div class="emp"><div style="font-size:40px">👟</div><div style="font-size:10px;margin-top:10px">Appuie sur + pour commencer</div></div>';
  else rec.forEach(function(i){h+=rowS(i);});
  return h;
}

function rowS(i){
  var r=roi(i),d=dif(i.bd,i.sd);
  var rt=r!==null?'<span class="bgv">vendu</span><div class="iroi" style="color:'+rc(r)+'">'+(r>=0?'+':'')+r.toFixed(0)+'%</div>':'<span class="bgs">stock</span><div class="im">'+d+'j</div>';
  return '<div class="ir"><div class="ie">'+i.img+'</div><div class="ii"><div class="in">'+i.name+cbadge(i.cat)+'</div><div class="im">'+(i.size?i.size+' - ':'')+i.bd+'</div></div><div class="irt">'+rt+'</div></div>';
}

function rStock(){
  var ns=inv.filter(function(i){return i.st==='stock';}).length,
      nv=inv.filter(function(i){return i.st==='vendu';}).length,
      nsk=inv.filter(function(i){return i.cat==='sneakers';}).length,
      nve=inv.filter(function(i){return i.cat==='vetements';}).length,
      nac=inv.filter(function(i){return i.cat==='accessoires';}).length;
  var h='<div class="fs">';
  h+='<button class="fb '+(filt==='all'?'act':'')+'" onclick="sf(\'all\')">Tout ('+inv.length+')</button>';
  h+='<button class="fb '+(filt==='stock'?'act':'')+'" onclick="sf(\'stock\')">Stock ('+ns+')</button>';
  h+='<button class="fb '+(filt==='vendu'?'act':'')+'" onclick="sf(\'vendu\')">Vendus ('+nv+')</button>';
  h+='<select class="ss2" onchange="ss2(this.value)">';
  h+='<option value="date"'+(srt==='date'?' selected':'')+'>Date</option>';
  h+='<option value="roi"'+(srt==='roi'?' selected':'')+'>ROI</option>';
  h+='<option value="profit"'+(srt==='profit'?' selected':'')+'>Profit</option>';
  h+='</select></div>';
  h+='<div class="fs" style="margin-top:-6px">';
  h+='<button class="fb '+(cfilt==='all'?'act':'')+'" onclick="scf(\'all\')">Tous</button>';
  h+='<button class="fb '+(cfilt==='sneakers'?'act':'')+'" onclick="scf(\'sneakers\')" style="color:#60a5fa;border-color:#60a5fa44">Snk ('+nsk+')</button>';
  h+='<button class="fb '+(cfilt==='vetements'?'act':'')+'" onclick="scf(\'vetements\')" style="color:#c084fc;border-color:#c084fc44">Vet ('+nve+')</button>';
  h+='<button class="fb '+(cfilt==='accessoires'?'act':'')+'" onclick="scf(\'accessoires\')" style="color:#fb923c;border-color:#fb923c44">Acc ('+nac+')</button>';
  h+='</div>';
  var list=inv.filter(function(i){ return (filt==='all'||i.st===filt)&&(cfilt==='all'||i.cat===cfilt); });
  list.sort(function(a,b){
    if(srt==='roi'){var ra=roi(a)!==null?roi(a):-9999,rb=roi(b)!==null?roi(b):-9999;return rb-ra;}
    if(srt==='profit'){var pa=prof(a)!==null?prof(a):-9999,pb=prof(b)!==null?prof(b):-9999;return pb-pa;}
    return new Date(b.bd)-new Date(a.bd);
  });
  if(!list.length) h+='<div class="emp"><div style="font-size:36px">📦</div><div style="font-size:10px;margin-top:8px">Aucun article</div></div>';
  else list.forEach(function(i){h+=rowF(i);});
  return h;
}

function rowF(i){
  var r=roi(i),p=prof(i),d=dif(i.bd,i.sd);
  var badge=i.st==='vendu'?'<span class="bgv">vendu</span>':'<span class="bgs">stock</span>';
  var rh=r!==null?
    '<div class="iroi" style="color:'+rc(r)+'">'+(r>=0?'+':'')+r.toFixed(0)+'%</div><div style="font-size:9px;color:'+rc(r)+'">'+(p>=0?'+':'')+E(p)+'</div>':
    '<div style="font-size:9px;color:var(--mut)">'+d+'j stock</div><button class="bsl" onclick="openSell('+i.id+')">Vendre</button>';
  var m2=E(i.buy)+(i.st==='vendu'?' > '+E(i.sell):'')+(i.plat?' - '+i.plat:'');
  var nt=i.notes?'<div class="im" style="color:var(--dim)">'+i.notes+'</div>':'';
  return '<div class="ir"><div class="ie">'+i.img+'</div><div class="ii"><div class="in">'+i.name+cbadge(i.cat)+'</div><div class="im">'+(i.size?i.size+' - ':'')+i.bd+'</div><div class="im">'+m2+'</div>'+nt+'</div><div class="irt" style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">'+badge+rh+'<button class="bdl" onclick="delItem('+i.id+')">x</button></div></div>';
}

function rAna(){
  var s=stats(),sold=inv.filter(function(i){return i.st==='vendu';});
  var h='<div class="ac"><div class="hl">P&L -- Compte de resultat</div><div class="pg">';
  h+='<div class="pi" style="border-color:var(--blu)"><div class="pl">Revenus</div><div class="pv" style="color:var(--blu)">+'+E(s.rev)+'</div></div>';
  h+='<div class="pi" style="border-color:var(--red)"><div class="pl">Cout achat</div><div class="pv" style="color:var(--red)">-'+E(s.cos)+'</div></div>';
  h+='<div class="pi" style="border-color:var(--ora)"><div class="pl">Frais</div><div class="pv" style="color:var(--ora)">-'+E(s.fee)+'</div></div>';
  var pc=s.pft>=0?'var(--acc)':'var(--red)';
  h+='<div class="pi" style="border-color:'+pc+'"><div class="pl">Benefice net</div><div class="pv" style="color:'+pc+'">'+(s.pft>=0?'+':'')+E(s.pft)+'</div></div>';
  h+='</div></div>';
  h+='<div class="ac"><div class="hl">Profit par categorie</div><canvas id="cc" height="160"></canvas></div>';
  h+='<div class="ac"><div class="hl">Profit mensuel</div><canvas id="cm" height="160"></canvas></div>';
  var bp={};
  sold.forEach(function(i){ var p=i.plat||'Autre'; if(!bp[p]) bp[p]={pft:0,cos:0,cnt:0}; bp[p].pft+=prof(i); bp[p].cos+=Number(i.buy); bp[p].cnt++; });
  var pks=Object.keys(bp).sort(function(a,b){return (bp[b].pft/bp[b].cos)-(bp[a].pft/bp[a].cos);});
  if(pks.length){
    var mx=0; pks.forEach(function(k){var r=(bp[k].pft/bp[k].cos)*100;if(r>mx)mx=r;});
    h+='<div class="ac"><div class="hl">ROI par plateforme</div>';
    pks.forEach(function(k){ var d=bp[k],r=(d.pft/d.cos)*100,w=mx>0?Math.max(4,(r/mx)*100):4;
      h+='<div class="brow"><div class="brh"><span>'+k+'</span><span style="color:'+rc(r)+'">+'+r.toFixed(0)+'% - '+E(d.pft)+'</span></div><div class="brt"><div class="brf" style="width:'+w+'%;background:'+rc(r)+'"></div></div><div style="font-size:8px;color:var(--mut);margin-top:2px">'+d.cnt+' vente(s)</div></div>';
    });
    h+='</div>';
  }
  var top=sold.slice().sort(function(a,b){return roi(b)-roi(a);}).slice(0,5);
  if(top.length){
    h+='<div class="ac"><div class="hl">Top ventes ROI</div>';
    top.forEach(function(i,idx){ var r=roi(i);
      h+='<div class="ti2"><div class="tr">#'+(idx+1)+'</div><div style="font-size:18px">'+i.img+'</div><div class="tif"><div class="tn">'+i.name+cbadge(i.cat)+'</div><div class="tm">'+dif(i.bd,i.sd)+'j rotation</div></div><div class="troi" style="color:'+rc(r)+'">+'+r.toFixed(0)+'%</div></div>';
    });
    h+='</div>';
  }
  var ins=inv.filter(function(i){return i.st==='stock';}).sort(function(a,b){return dif(b.bd)-dif(a.bd);});
  if(ins.length){
    h+='<div class="ac"><div class="hl">Rotation des stocks</div>';
    ins.forEach(function(i){ var d=dif(i.bd),col=d>60?'var(--red)':d>30?'var(--ora)':d>14?'var(--yel)':'var(--grn)',w=Math.min((d/90)*100,100);
      h+='<div class="ti2"><div style="font-size:20px">'+i.img+'</div><div class="tif"><div class="tn">'+i.name+cbadge(i.cat)+'</div><div class="rb"><div class="rf" style="width:'+w+'%;background:'+col+'"></div></div><div class="tm" style="margin-top:2px">'+E(i.buy)+'</div></div><div class="troi" style="color:'+col+'">'+d+'j</div></div>';
    });
    h+='</div>';
  }
  return h;
}

function drawCharts(){
  var sold=inv.filter(function(i){return i.st==='vendu';});
  var cd={sneakers:0,vetements:0,accessoires:0};
  sold.forEach(function(i){var c=i.cat||'sneakers';cd[c]+=prof(i);});
  var c1=document.getElementById('cc');
  if(c1){
    var ctx=c1.getContext('2d');
    var W=c1.offsetWidth||280,H=160;
    c1.width=W;c1.height=H;ctx.clearRect(0,0,W,H);
    var cats=['sneakers','vetements','accessoires'],labs=['Sneakers','Vetements','Access.'],cols=['#60a5fa','#c084fc','#fb923c'];
    var vals=cats.map(function(c){return cd[c];});
    var mx=Math.max.apply(null,vals.map(function(v){return Math.abs(v);}));if(!mx)mx=1;
    var bw=56,gap=(W-cats.length*bw)/(cats.length+1),bl=H-28;
    cats.forEach(function(c,idx){
      var x=gap+idx*(bw+gap),v=vals[idx],bh=Math.abs(v)/mx*(bl-16);
      ctx.fillStyle=cols[idx];ctx.globalAlpha=0.85;
      if(v>=0)ctx.fillRect(x,bl-bh,bw,bh);else ctx.fillRect(x,bl,bw,bh);
      ctx.globalAlpha=1;ctx.fillStyle=cols[idx];ctx.font='10px monospace';ctx.textAlign='center';
      ctx.fillText((v>=0?'+':'')+Math.round(v)+'E',x+bw/2,v>=0?bl-bh-4:bl+bh+12);
      ctx.fillStyle='#555';ctx.font='9px monospace';ctx.fillText(labs[idx],x+bw/2,H-6);
    });
    ctx.strokeStyle='#2a2a2a';ctx.beginPath();ctx.moveTo(0,bl);ctx.lineTo(W,bl);ctx.stroke();
  }
  var md={};
  sold.forEach(function(i){ if(!i.sd)return; var k=i.sd.substring(0,7); if(!md[k])md[k]=0; md[k]+=prof(i); });
  var mks=Object.keys(md).sort();
  var c2=document.getElementById('cm');
  if(c2){
    var ctx2=c2.getContext('2d');
    var W2=c2.offsetWidth||280,H2=160;
    c2.width=W2;c2.height=H2;ctx2.clearRect(0,0,W2,H2);
    if(!mks.length){
      ctx2.fillStyle='#333';ctx2.font='10px monospace';ctx2.textAlign='center';
      ctx2.fillText('Pas encore de ventes',W2/2,80);return;
    }
    var mv=mks.map(function(k){return md[k];});
    var mmx=Math.max.apply(null,mv),mmn=Math.min(0,Math.min.apply(null,mv)),rng=mmx-mmn||1;
    var pL=8,pR=8,pT=18,pB=26,pw=W2-pL-pR,ph=H2-pT-pB;
    var stp=mks.length>1?pw/(mks.length-1):pw;
    var zy=pT+ph-((0-mmn)/rng)*ph;
    ctx2.strokeStyle='#2a2a2a';ctx2.beginPath();ctx2.moveTo(pL,zy);ctx2.lineTo(W2-pR,zy);ctx2.stroke();
    ctx2.beginPath();
    mks.forEach(function(m,i){var x=pL+i*stp,y=pT+ph-((mv[i]-mmn)/rng)*ph;if(i===0)ctx2.moveTo(x,y);else ctx2.lineTo(x,y);});
    ctx2.lineTo(pL+(mks.length-1)*stp,zy);ctx2.lineTo(pL,zy);ctx2.closePath();
    ctx2.fillStyle='rgba(212,255,107,0.08)';ctx2.fill();
    ctx2.beginPath();ctx2.strokeStyle='#d4ff6b';ctx2.lineWidth=2;
    mks.forEach(function(m,i){var x=pL+i*stp,y=pT+ph-((mv[i]-mmn)/rng)*ph;if(i===0)ctx2.moveTo(x,y);else ctx2.lineTo(x,y);});
    ctx2.stroke();ctx2.lineWidth=1;
    mks.forEach(function(m,i){
      var x=pL+i*stp,y=pT+ph-((mv[i]-mmn)/rng)*ph;
      ctx2.beginPath();ctx2.arc(x,y,3,0,Math.PI*2);ctx2.fillStyle='#d4ff6b';ctx2.fill();
      ctx2.fillStyle=mv[i]>=0?'#d4ff6b':'#ef4444';ctx2.font='9px monospace';ctx2.textAlign='center';
      ctx2.fillText((mv[i]>=0?'+':'')+Math.round(mv[i]),x,y-8);
      var mo=parseInt(m.substring(5));
      ctx2.fillStyle='#444';ctx2.fillText(MONTHS[mo-1],x,H2-6);
    });
  }
}

function mCA(y,m){ var k=y+'-'+(m<10?'0'+m:m); return inv.filter(function(i){return i.st==='vendu'&&i.sd&&i.sd.substring(0,7)===k;}).reduce(function(s,i){return s+prof(i);},0); }
function yCA(){ var y=new Date().getFullYear(); return inv.filter(function(i){return i.st==='vendu'&&i.sd&&i.sd.substring(0,4)===''+y;}).reduce(function(s,i){return s+prof(i);},0); }

function upSlider(w,v){
  v=parseInt(v);
  var r=loadRep();r[w]=v;
  var ot=['stock','livret','moi'].filter(function(k){return k!==w;});
  var tot=100-v,cur=r[ot[0]]+r[ot[1]];
  if(!cur){r[ot[0]]=Math.floor(tot/2);r[ot[1]]=tot-r[ot[0]];}
  else{r[ot[0]]=Math.round(r[ot[0]]/cur*tot);r[ot[1]]=tot-r[ot[0]];}
  if(r[ot[1]]<0){r[ot[0]]+=r[ot[1]];r[ot[1]]=0;}
  if(r[ot[0]]<0)r[ot[0]]=0;
  saveRep(r);render();
}

function rFin(){
  var now=new Date(),y=now.getFullYear(),m=now.getMonth()+1;
  var cam=mCA(y,m),cay=yCA(),r=loadRep(),seuil=10000;
  var pct=Math.min((cay/seuil)*100,100);
  var mn=MLONG[now.getMonth()]+' '+y;
  var h='';
  if(cay>7000) h+='<div class="alb"><div class="alt">Attention seuil</div><div class="alx">Tu as realise '+E(cay)+' de benefices cette annee. Au-dela de '+E(seuil)+' il est recommande de declarer ton activite.</div></div>';
  h+='<div class="ac"><div class="hl">Benefice - '+mn+'</div>';
  h+='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:38px;letter-spacing:2px;color:'+(cam>=0?'var(--acc)':'var(--red)')+'">'+(cam>=0?'+':'')+E(cam)+'</div>';
  h+='<div style="font-size:9px;color:var(--mut);margin-top:5px">Annee en cours : '+E(cay)+' / '+E(seuil)+'</div>';
  h+='<div style="margin-top:6px;height:4px;background:#1a1a1a;border-radius:2px"><div style="height:4px;width:'+pct+'%;background:'+(pct>80?'var(--red)':pct>60?'var(--ora)':'var(--acc)')+';border-radius:2px"></div></div>';
  h+='</div>';
  h+='<div class="ac"><div class="hl">Ma repartition</div>';
  var sls=[{k:'stock',l:'Rachat de stock',ic:'📦',c:'var(--blu)'},{k:'livret',l:'Livret A / Epargne',ic:'🏦',c:'var(--grn)'},{k:'moi',l:'Je me verse',ic:'💰',c:'var(--acc)'}];
  sls.forEach(function(s){
    var p=r[s.k],amt=Math.round(cam*p/100);
    h+='<div class="slw">';
    h+='<div class="slh"><div class="sll"><span>'+s.ic+'</span><span>'+s.l+'</span></div><div class="slv" style="color:'+s.c+'">'+p+'%</div></div>';
    h+='<input type="range" min="0" max="100" value="'+p+'" oninput="upSlider(\''+s.k+'\',this.value)"/>';
    h+='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:'+s.c+';margin-top:3px">'+(amt>=0?'+':'')+E(amt)+'</div>';
    h+='</div>';
  });
  var tot=r.stock+r.livret+r.moi;
  h+='<div style="font-size:9px;color:'+(tot===100?'var(--mut)':'var(--red)')+';text-align:right">Total : '+tot+'%'+(tot!==100?' (doit faire 100%)':' OK')+'</div>';
  h+='</div>';
  h+='<div class="ac"><div class="hl">Historique 6 mois</div>';
  var hist=[];
  for(var mo=0;mo<6;mo++){
    var d2=new Date(y,m-1-mo,1),y2=d2.getFullYear(),m2=d2.getMonth()+1;
    hist.unshift({l:MONTHS[d2.getMonth()],ca:mCA(y2,m2)});
  }
  var mxh=Math.max.apply(null,hist.map(function(x){return Math.abs(x.ca);}));if(!mxh)mxh=1;
  hist.forEach(function(x){
    var w=Math.max(4,(Math.abs(x.ca)/mxh)*100),col=x.ca>=0?'var(--acc)':'var(--red)';
    h+='<div class="hr"><div class="hm">'+x.l+'</div><div class="hbw"><div class="hb" style="width:'+w+'%;background:'+col+'"></div></div><div class="ha" style="color:'+col+'">'+(x.ca>=0?'+':'')+Math.round(x.ca)+'E</div></div>';
  });
  h+='</div>';
  return h;
}

function sf(f){filt=f;render();}
function scf(f){cfilt=f;render();}
function ss2(s){srt=s;render();}

function buildCG(){
  var cs=['sneakers','vetements','accessoires'],ls=['Sneakers','Vetements','Access.'];
  var h='';
  cs.forEach(function(c,i){h+='<button class="cb'+(c===cat?' c'+c[0]:'');h+='" onclick="selCat(\''+c+'\')">'+ls[i]+'</button>';});
  document.getElementById('cg').innerHTML=h;
}
function buildEG(){
  var em=EC[cat]||EC.sneakers,h='';
  em.forEach(function(e){h+='<button class="eb'+(e===emoji?' sel':'')+'" onclick="selE(\''+e+'\')">'+e+'</button>';});
  document.getElementById('eg').innerHTML=h;
}
function selCat(c){
  cat=c;emoji=EC[c][0];
  var lbl=document.getElementById('fsl');
  if(lbl)lbl.textContent=c==='sneakers'?'Pointure':'Taille';
  buildCG();buildEG();
}
function selE(e){emoji=e;buildEG();}

function openAdd(){
  document.getElementById('fn').value='';
  document.getElementById('fsz').value='';
  document.getElementById('fb').value='';
  document.getElementById('fd').value=td();
  document.getElementById('fp').value='';
  document.getElementById('fno').value='';
  cat='sneakers';emoji='👟';
  buildCG();buildEG();
  document.getElementById('modal-add').style.display='flex';
}
function closeAdd(){document.getElementById('modal-add').style.display='none';}

function addItem(){
  var name=document.getElementById('fn').value.trim(),buy=parseFloat(document.getElementById('fb').value);
  if(!name||!buy){alert('Nom et prix requis');return;}
  inv.unshift({id:Date.now(),name:name,img:emoji,cat:cat,size:document.getElementById('fsz').value,buy:buy,bd:document.getElementById('fd').value||td(),plat:document.getElementById('fp').value,notes:document.getElementById('fno').value,sell:null,sd:null,st:'stock',fees:0});
  saveInv();closeAdd();render();
}

function openSell(id){
  var f=null;for(var i=0;i<inv.length;i++)if(inv[i].id===id){f=inv[i];break;}
  if(!f)return;stgt=f;
  document.getElementById('sh').innerHTML=f.img+' <strong>'+f.name+'</strong> - achete '+E(f.buy);
  document.getElementById('sp').value='';document.getElementById('sf').value='';
  document.getElementById('sd').value=td();document.getElementById('spl').value=f.plat||'';
  document.getElementById('sprev').style.display='none';
  document.getElementById('modal-sell').style.display='flex';
}
function closeSell(){document.getElementById('modal-sell').style.display='none';}

function upPrev(){
  if(!stgt)return;
  var sp=parseFloat(document.getElementById('sp').value),fees=parseFloat(document.getElementById('sf').value)||0;
  if(!sp){document.getElementById('sprev').style.display='none';return;}
  var p=sp-stgt.buy-fees,r=(p/stgt.buy)*100;
  document.getElementById('sprev').style.display='block';
  document.getElementById('pp').textContent=(p>=0?'+':'')+E(p);document.getElementById('pp').style.color=rc(r);
  document.getElementById('pr').textContent=(r>=0?'+':'')+r.toFixed(0)+'%';document.getElementById('pr').style.color=rc(r);
}

function confSell(){
  var sp=parseFloat(document.getElementById('sp').value);
  if(!sp||!stgt){alert('Prix requis');return;}
  for(var i=0;i<inv.length;i++)if(inv[i].id===stgt.id){inv[i].sell=sp;inv[i].fees=parseFloat(document.getElementById('sf').value)||0;inv[i].sd=document.getElementById('sd').value||td();inv[i].plat=document.getElementById('spl').value||inv[i].plat;inv[i].st='vendu';break;}
  stgt=null;saveInv();closeSell();render();
}

function delItem(id){
  if(!confirm('Supprimer ?'))return;
  inv=inv.filter(function(i){return i.id!==id;});
  saveInv();render();
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
loadInv();render();
</script>
