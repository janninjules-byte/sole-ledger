<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Sole Ledger"/>
<meta name="theme-color" content="#0a0a0a"/>
<link rel="manifest" href="manifest.json"/>
<title>Sole Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--surface:#111;--border:#1e1e1e;--border2:#2a2a2a;
  --text:#f5f5f0;--muted:#555;--dim:#333;
  --accent:#d4ff6b;--green:#22c55e;--red:#ef4444;--orange:#f97316;--yellow:#eab308;--purple:#a78bfa;--blue:#60a5fa;
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden}
body{display:flex;flex-direction:column}
#header{background:var(--bg);border-bottom:1px solid var(--border);padding:calc(12px + var(--safe-top)) 16px 0;flex-shrink:0}
#logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:var(--accent);padding-bottom:12px}
#nav{display:flex}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:10px 14px 8px;cursor:pointer;transition:all .2s}
.nav-btn.active{color:var(--text);border-bottom-color:var(--accent)}
#ticker-wrap{background:#0f0f0f;border-bottom:1px solid var(--border);padding:7px 0;overflow:hidden;flex-shrink:0;display:none}
#ticker{display:inline-block;white-space:nowrap;animation:ticker 25s linear infinite}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item{font-size:11px;color:var(--muted);margin-right:48px}
#content{flex:1;overflow-y:auto;padding:16px 16px calc(80px + var(--safe-bottom));-webkit-overflow-scrolling:touch}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px}
.stat-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;line-height:1}
.stat-sub{font-size:10px;color:var(--dim);margin-top:4px}
.sec-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.item-row{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.item-emoji{font-size:28px;width:38px;text-align:center;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:10px;color:var(--muted);margin-top:3px}
.item-right{text-align:right;flex-shrink:0}
.item-roi{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:9px;letter-spacing:1px;text-transform:uppercase}
.badge-stock{background:#1a2a1a;color:var(--green);border:1px solid #22c55e33}
.badge-vendu{background:#1a1a2a;color:#818cf8;border:1px solid #6366f133}
.btn-primary{background:var(--accent);color:var(--bg);border:none;padding:13px 20px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:500;border-radius:2px;width:100%;margin-top:4px}
.btn-ghost{background:none;border:1px solid var(--dim);color:#aaa;padding:10px 16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;border-radius:2px}
.btn-sell{background:none;border:1px solid var(--dim);color:#aaa;padding:5px 10px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;border-radius:2px}
.btn-del{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
#fab{position:fixed;bottom:calc(24px + var(--safe-bottom));right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(212,255,107,.3);display:flex;align-items:center;justify-content:center;z-index:50;font-weight:300;line-height:1}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;border-radius:2px}
.filter-btn.active{border-color:var(--accent);color:var(--accent)}
.sort-sel{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 10px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;border-radius:2px;margin-left:auto}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:flex-end;z-index:100}
.modal{background:#111;border-top:1px solid var(--border2);border-radius:16px 16px 0 0;padding:24px 20px calc(24px + var(--safe-bottom));width:100%;max-height:92vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--accent);margin-bottom:20px}
.field{margin-bottom:14px}
.field-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.input{background:#0f0f0f;border:1px solid var(--border2);color:var(--text);padding:12px;font-family:'DM Mono',monospace;font-size:13px;width:100%;border-radius:3px;outline:none;-webkit-appearance:none}
.input:focus{border-color:var(--accent)}
select.input{cursor:pointer}
.emoji-grid{display:flex;gap:8px;flex-wrap:wrap}
.emoji-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:22px;cursor:pointer}
.emoji-btn.selected{border-color:var(--accent);background:#1a1a00}
.preview-box{background:#0f0f0f;border:1px solid var(--border);border-radius:3px;padding:14px;margin-bottom:14px}
.preview-row{display:flex;gap:24px}
.p-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.p-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.analytics-card{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:16px;margin-bottom:12px}
.bar-row{margin-bottom:12px}
.bar-header{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px}
.bar-track{height:4px;background:#1a1a1a;border-radius:2px}
.bar-fill{height:4px;border-radius:2px}
.bar-sub{font-size:9px;color:var(--muted);margin-top:3px}
.pnl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pnl-item{border-left:2px solid;padding-left:12px}
.pnl-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.pnl-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.top-item{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.top-rank{font-size:10px;color:var(--dim);width:18px}
.top-info{flex:1}
.top-name{font-size:11px}
.top-meta{font-size:9px;color:var(--muted)}
.top-roi{font-family:'Bebas Neue',sans-serif;font-size:20px}
.rotation-bar{height:3px;background:#1a1a1a;border-radius:2px;margin-top:6px}
.rotation-fill{height:3px;border-radius:2px}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:11px;letter-spacing:1px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333}
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div id="logo">SOLE LEDGER</div>
    <div style="font-size:9px;color:var(--muted);letter-spacing:1px">v1.0</div>
  </div>
  <div id="nav">
    <button class="nav-btn active" onclick="switchView('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="switchView('stock')">Stock</button>
    <button class="nav-btn" onclick="switchView('analytics')">Analytics</button>
  </div>
</div>

<div id="ticker-wrap"><div id="ticker"></div></div>
<div id="content"></div>
<button id="fab" onclick="openModal('add')">+</button>

<!-- MODAL ADD -->
<div class="overlay" id="modal-add" style="display:none" onclick="closeModal('add')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Nouvelle paire</div>
    <div class="field">
      <div class="field-label">Emoji</div>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
    <div class="field">
      <div class="field-label">Nom *</div>
      <input class="input" id="f-name" placeholder="Nike Dunk Low Panda" type="text"/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field">
        <div class="field-label">Pointure</div>
        <input class="input" id="f-size" placeholder="43" type="text"/>
      </div>
      <div class="field">
        <div class="field-label">Prix achat (euro) *</div>
        <input class="input" id="f-buy" placeholder="110" type="number" inputmode="decimal"/>
      </div>
    </div>
    <div class="field">
      <div class="field-label">Date achat</div>
      <input class="input" id="f-date" type="date"/>
    </div>
    <div class="field">
      <div class="field-label">Plateforme</div>
      <select class="input" id="f-platform">
        <option value="">--- selectionner ---</option>
        <option>StockX</option><option>GOAT</option><option>Vinted</option>
        <option>Depop</option><option>Vestiaire</option><option>Instagram</option>
        <option>Leboncoin</option><option>Nike SNKRS</option><option>Retail</option><option>Autre</option>
      </select>
    </div>
    <div class="field">
      <div class="field-label">Notes</div>
      <input class="input" id="f-notes" placeholder="OG box, deadstock..." type="text"/>
    </div>
    <button class="btn-primary" onclick="addSneaker()">Ajouter au stock</button>
    <div style="height:10px"></div>
    <button class="btn-ghost" style="width:100%" onclick="closeModal('add')">Annuler</button>
  </div>
</div>

<!-- MODAL SELL -->
<div class="overlay" id="modal-sell" style="display:none" onclick="closeModal('sell')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Marquer vendu</div>
    <div id="sell-header" style="font-size:12px;color:var(--muted);margin-bottom:20px"></div>
    <div class="field">
      <div class="field-label">Prix de vente (euro) *</div>
      <input class="input" id="s-price" placeholder="180" type="number" inputmode="decimal" oninput="updatePreview()"/>
    </div>
    <div class="field">
      <div class="field-label">Frais plateforme (euro)</div>
      <input class="input" id="s-fees" placeholder="0" type="number" inputmode="decimal" oninput="updatePreview()"/>
    </div>
    <div class="field">
      <div class="field-label">Date de vente</div>
      <input class="input" id="s-date" type="date"/>
    </div>
    <div class="field">
      <div class="field-label">Plateforme</div>
      <select class="input" id="s-platform">
        <option value="">--- selectionner ---</option>
        <option>StockX</option><option>GOAT</option><option>Vinted</option>
        <option>Depop</option><option>Vestiaire</option><option>Instagram</option>
        <option>Leboncoin</option><option>Autre</option>
      </select>
    </div>
    <div class="preview-box" id="sell-preview" style="display:none">
      <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Apercu</div>
      <div class="preview-row">
        <div><div class="p-label">Profit net</div><div class="p-val" id="prev-profit"></div></div>
        <div><div class="p-label">ROI</div><div class="p-val" id="prev-roi"></div></div>
      </div>
    </div>
    <button class="btn-primary" onclick="confirmSell()">Confirmer la vente</button>
    <div style="height:10px"></div>
    <button class="btn-ghost" style="width:100%" onclick="closeModal('sell')">Annuler</button>
  </div>
</div>

<script>
var EMOJIS = ['👟','🔵','⚪','🐼','🏀','🌿','🔴','⚫','🟡','💎','🦅','🔥'];
var inventory = [];
var currentView = 'dashboard';
var currentFilter = 'all';
var currentSort = 'date';
var sellTarget = null;
var selectedEmoji = '👟';

function loadData() {
  try {
    var raw = localStorage.getItem('sl_v2');
    if (raw) inventory = JSON.parse(raw);
  } catch(e) { inventory = []; }
  if (!inventory || inventory.length === 0) {
    inventory = [
      {id:1,name:'Nike Dunk Low Panda',size:'43',buyPrice:110,sellPrice:null,platform:'StockX',buyDate:'2025-01-15',sellDate:null,status:'stock',fees:0,notes:'',image:'🐼'},
      {id:2,name:'Jordan 1 Retro High OG',size:'42',buyPrice:185,sellPrice:310,platform:'Vinted',buyDate:'2025-01-08',sellDate:'2025-02-01',status:'vendu',fees:12,notes:'',image:'🏀'},
      {id:3,name:'Yeezy 350 V2 Zebra',size:'44',buyPrice:220,sellPrice:280,platform:'GOAT',buyDate:'2025-02-10',sellDate:'2025-02-28',status:'vendu',fees:22,notes:'',image:'🌿'},
      {id:4,name:'New Balance 550 BB',size:'41',buyPrice:95,sellPrice:null,platform:'',buyDate:'2025-03-01',sellDate:null,status:'stock',fees:0,notes:'OG box',image:'🔵'},
      {id:5,name:'Air Force 1 07',size:'43',buyPrice:90,sellPrice:130,platform:'Depop',buyDate:'2025-02-20',sellDate:'2025-03-10',status:'vendu',fees:8,notes:'',image:'⚪'}
    ];
    saveData();
  }
}

function saveData() {
  try { localStorage.setItem('sl_v2', JSON.stringify(inventory)); } catch(e) {}
}

function eur(n) { return (Math.round(Number(n))) + ' EUR'; }
function roiCol(r) {
  if (r >= 30) return 'var(--green)';
  if (r >= 10) return 'var(--yellow)';
  if (r >= 0) return 'var(--orange)';
  return 'var(--red)';
}
function daysBetween(d1, d2) {
  var a = new Date(d1);
  var b = d2 ? new Date(d2) : new Date();
  return Math.max(0, Math.round((b - a) / 86400000));
}
function getToday() { return new Date().toISOString().split('T')[0]; }
function itemRoi(item) {
  if (item.status !== 'vendu') return null;
  return ((item.sellPrice - item.buyPrice - item.fees) / item.buyPrice) * 100;
}
function itemProfit(item) {
  if (item.status !== 'vendu') return null;
  return item.sellPrice - item.buyPrice - item.fees;
}

function calcStats() {
  var sold = inventory.filter(function(i){ return i.status === 'vendu'; });
  var stock = inventory.filter(function(i){ return i.status === 'stock'; });
  var revenue = 0, costSold = 0, fees = 0, stockVal = 0, totalDays = 0;
  sold.forEach(function(i){
    revenue += Number(i.sellPrice);
    costSold += Number(i.buyPrice);
    fees += Number(i.fees);
    totalDays += daysBetween(i.buyDate, i.sellDate);
  });
  stock.forEach(function(i){ stockVal += Number(i.buyPrice); });
  var profit = revenue - costSold - fees;
  var roi = costSold > 0 ? (profit / costSold) * 100 : 0;
  var avgDays = sold.length > 0 ? totalDays / sold.length : 0;
  return {revenue:revenue, profit:profit, roi:roi, avgDays:avgDays, fees:fees, stockVal:stockVal, costSold:costSold, soldCount:sold.length, stockCount:stock.length};
}

function switchView(v) {
  currentView = v;
  var btns = document.querySelectorAll('.nav-btn');
  var views = ['dashboard','stock','analytics'];
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', views[i] === v);
  }
  render();
}

function buildTicker() {
  var sold = inventory.filter(function(i){ return i.status === 'vendu'; });
  var tw = document.getElementById('ticker-wrap');
  if (!sold.length) { tw.style.display = 'none'; return; }
  tw.style.display = 'block';
  var items = sold.concat(sold).map(function(i){
    var r = itemRoi(i);
    var p = itemProfit(i);
    return '<span class="tick-item"><span style="color:var(--accent)">' + i.image + ' ' + i.name + '</span> -- <span style="color:' + roiCol(r) + '">+' + r.toFixed(0) + '% ROI</span> -- <span style="color:var(--green)">+' + eur(p) + '</span></span>';
  });
  document.getElementById('ticker').innerHTML = items.join('');
}

function render() {
  buildTicker();
  var el = document.getElementById('content');
  if (currentView === 'dashboard') el.innerHTML = renderDashboard();
  else if (currentView === 'stock') el.innerHTML = renderStock();
  else el.innerHTML = renderAnalytics();
}

function renderDashboard() {
  var s = calcStats();
  var html = '<div class="stats-grid">';
  var cards = [
    {label:'Profit net', val: (s.profit >= 0 ? '+' : '') + eur(s.profit), sub:'apres ' + eur(s.fees) + ' frais', col: s.profit >= 0 ? 'var(--accent)' : 'var(--red)'},
    {label:'ROI moyen', val: s.roi.toFixed(1) + '%', sub: s.soldCount + ' vente(s)', col: roiCol(s.roi)},
    {label:'Capital stock', val: eur(s.stockVal), sub: s.stockCount + ' paire(s)', col: 'var(--text)'},
    {label:'Rotation moy.', val: Math.round(s.avgDays) + 'j', sub: 'buy vers sell', col: 'var(--purple)'},
    {label:'Revenus bruts', val: eur(s.revenue), sub: 'total ventes', col: 'var(--blue)'},
    {label:'Investi total', val: eur(s.costSold + s.stockVal), sub: 'tout confondu', col: 'var(--text)'}
  ];
  cards.forEach(function(c){
    html += '<div class="stat-card"><div class="stat-label">' + c.label + '</div><div class="stat-val" style="color:' + c.col + '">' + c.val + '</div><div class="stat-sub">' + c.sub + '</div></div>';
  });
  html += '</div>';
  html += '<div class="sec-label">Activite recente</div>';
  var recent = inventory.slice().sort(function(a,b){ return new Date(b.buyDate) - new Date(a.buyDate); }).slice(0,5);
  if (recent.length === 0) {
    html += '<div class="empty"><div class="empty-icon">👟</div><div class="empty-text">Aucune paire -- appuie sur + pour commencer</div></div>';
  } else {
    recent.forEach(function(item){ html += renderItemRow(item); });
  }
  return html;
}

function renderItemRow(item) {
  var roi = itemRoi(item);
  var d = daysBetween(item.buyDate, item.sellDate);
  var right = '';
  if (roi !== null) {
    right = '<span class="badge badge-vendu">vendu</span><div class="item-roi" style="color:' + roiCol(roi) + '">' + (roi >= 0 ? '+' : '') + roi.toFixed(0) + '%</div>';
  } else {
    right = '<span class="badge badge-stock">stock</span><div class="item-meta">' + d + 'j en stock</div>';
  }
  return '<div class="item-row"><div class="item-emoji">' + item.image + '</div><div class="item-info"><div class="item-name">' + item.name + '</div><div class="item-meta">' + (item.size ? 'T.' + item.size + ' - ' : '') + item.buyDate + '</div></div><div class="item-right">' + right + '</div></div>';
}

function renderStock() {
  var nStock = inventory.filter(function(i){ return i.status === 'stock'; }).length;
  var nVendu = inventory.filter(function(i){ return i.status === 'vendu'; }).length;
  var html = '<div class="filters">';
  html += '<button class="filter-btn ' + (currentFilter === 'all' ? 'active' : '') + '" onclick="setFilter(\'all\')">Tout (' + inventory.length + ')</button>';
  html += '<button class="filter-btn ' + (currentFilter === 'stock' ? 'active' : '') + '" onclick="setFilter(\'stock\')">Stock (' + nStock + ')</button>';
  html += '<button class="filter-btn ' + (currentFilter === 'vendu' ? 'active' : '') + '" onclick="setFilter(\'vendu\')">Vendus (' + nVendu + ')</button>';
  html += '<select class="sort-sel" onchange="setSort(this.value)">';
  html += '<option value="date"' + (currentSort === 'date' ? ' selected' : '') + '>Date</option>';
  html += '<option value="roi"' + (currentSort === 'roi' ? ' selected' : '') + '>ROI</option>';
  html += '<option value="profit"' + (currentSort === 'profit' ? ' selected' : '') + '>Profit</option>';
  html += '</select></div>';

  var list = currentFilter === 'all' ? inventory.slice() : inventory.filter(function(i){ return i.status === currentFilter; });
  list.sort(function(a, b){
    if (currentSort === 'roi') {
      var ra = itemRoi(a) !== null ? itemRoi(a) : -9999;
      var rb = itemRoi(b) !== null ? itemRoi(b) : -9999;
      return rb - ra;
    }
    if (currentSort === 'profit') {
      var pa = itemProfit(a) !== null ? itemProfit(a) : -9999;
      var pb = itemProfit(b) !== null ? itemProfit(b) : -9999;
      return pb - pa;
    }
    return new Date(b.buyDate) - new Date(a.buyDate);
  });

  if (list.length === 0) {
    html += '<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Aucune paire dans cette categorie</div></div>';
  } else {
    list.forEach(function(item){ html += renderItemRowFull(item); });
  }
  return html;
}

function renderItemRowFull(item) {
  var roi = itemRoi(item);
  var profit = itemProfit(item);
  var d = daysBetween(item.buyDate, item.sellDate);
  var badge = item.status === 'vendu' ? '<span class="badge badge-vendu">vendu</span>' : '<span class="badge badge-stock">stock</span>';
  var roiHtml = '';
  if (roi !== null) {
    roiHtml = '<div class="item-roi" style="color:' + roiCol(roi) + '">' + (roi >= 0 ? '+' : '') + roi.toFixed(0) + '%</div><div style="font-size:10px;color:' + roiCol(roi) + '">' + (profit >= 0 ? '+' : '') + eur(profit) + '</div>';
  } else {
    roiHtml = '<div style="font-size:10px;color:var(--muted)">' + d + 'j en stock</div><button class="btn-sell" onclick="openSell(' + item.id + ')">Vendre</button>';
  }
  var meta2 = eur(item.buyPrice) + (item.status === 'vendu' ? ' > ' + eur(item.sellPrice) : '') + (item.platform ? ' - ' + item.platform : '');
  var notes = item.notes ? '<div class="item-meta" style="color:var(--dim)">' + item.notes + '</div>' : '';
  return '<div class="item-row"><div class="item-emoji">' + item.image + '</div><div class="item-info"><div class="item-name">' + item.name + '</div><div class="item-meta">' + (item.size ? 'T.' + item.size + ' - ' : '') + item.buyDate + '</div><div class="item-meta">' + meta2 + '</div>' + notes + '</div><div class="item-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">' + badge + roiHtml + '<button class="btn-del" onclick="deleteItem(' + item.id + ')">x</button></div></div>';
}

function renderAnalytics() {
  var s = calcStats();
  var sold = inventory.filter(function(i){ return i.status === 'vendu'; });
  var html = '';

  // P&L
  html += '<div class="analytics-card"><div class="sec-label">P&L -- Compte de resultat</div><div class="pnl-grid">';
  html += '<div class="pnl-item" style="border-color:var(--blue)"><div class="pnl-label">Revenus bruts</div><div class="pnl-val" style="color:var(--blue)">+' + eur(s.revenue) + '</div></div>';
  html += '<div class="pnl-item" style="border-color:var(--red)"><div class="pnl-label">Cout achat</div><div class="pnl-val" style="color:var(--red)">-' + eur(s.costSold) + '</div></div>';
  html += '<div class="pnl-item" style="border-color:var(--orange)"><div class="pnl-label">Frais</div><div class="pnl-val" style="color:var(--orange)">-' + eur(s.fees) + '</div></div>';
  var pc = s.profit >= 0 ? 'var(--accent)' : 'var(--red)';
  html += '<div class="pnl-item" style="border-color:' + pc + '"><div class="pnl-label">Benefice net</div><div class="pnl-val" style="color:' + pc + '">' + (s.profit >= 0 ? '+' : '') + eur(s.profit) + '</div></div>';
  html += '</div></div>';

  // By platform
  var byPlat = {};
  sold.forEach(function(i){
    var p = i.platform || 'Autre';
    if (!byPlat[p]) byPlat[p] = {profit:0, cost:0, count:0};
    byPlat[p].profit += itemProfit(i);
    byPlat[p].cost += Number(i.buyPrice);
    byPlat[p].count++;
  });
  var platKeys = Object.keys(byPlat).sort(function(a,b){ return (byPlat[b].profit/byPlat[b].cost) - (byPlat[a].profit/byPlat[a].cost); });
  if (platKeys.length > 0) {
    var maxR = 0;
    platKeys.forEach(function(k){ var r = (byPlat[k].profit/byPlat[k].cost)*100; if(r>maxR) maxR=r; });
    html += '<div class="analytics-card"><div class="sec-label">ROI par plateforme</div>';
    platKeys.forEach(function(k){
      var d = byPlat[k];
      var r = (d.profit / d.cost) * 100;
      var w = maxR > 0 ? Math.max(4, (r/maxR)*100) : 4;
      html += '<div class="bar-row"><div class="bar-header"><span>' + k + '</span><span style="color:' + roiCol(r) + '">+' + r.toFixed(0) + '% - ' + eur(d.profit) + '</span></div><div class="bar-track"><div class="bar-fill" style="width:' + w + '%;background:' + roiCol(r) + '"></div></div><div class="bar-sub">' + d.count + ' vente(s)</div></div>';
    });
    html += '</div>';
  }

  // Top 5
  var top5 = sold.slice().sort(function(a,b){ return itemRoi(b) - itemRoi(a); }).slice(0,5);
  if (top5.length > 0) {
    html += '<div class="analytics-card"><div class="sec-label">Top ventes ROI</div>';
    top5.forEach(function(item, idx){
      var r = itemRoi(item);
      html += '<div class="top-item"><div class="top-rank">#' + (idx+1) + '</div><div style="font-size:20px">' + item.image + '</div><div class="top-info"><div class="top-name">' + item.name + '</div><div class="top-meta">' + daysBetween(item.buyDate, item.sellDate) + 'j de rotation</div></div><div class="top-roi" style="color:' + roiCol(r) + '">+' + r.toFixed(0) + '%</div></div>';
    });
    html += '</div>';
  }

  // Stock aging
  var inStock = inventory.filter(function(i){ return i.status === 'stock'; }).sort(function(a,b){ return daysBetween(b.buyDate) - daysBetween(a.buyDate); });
  if (inStock.length > 0) {
    html += '<div class="analytics-card"><div class="sec-label">Rotation des stocks</div>';
    inStock.forEach(function(item){
      var d = daysBetween(item.buyDate);
      var col = d > 60 ? 'var(--red)' : d > 30 ? 'var(--orange)' : d > 14 ? 'var(--yellow)' : 'var(--green)';
      var w = Math.min((d/90)*100, 100);
      html += '<div class="top-item"><div style="font-size:22px">' + item.image + '</div><div class="top-info"><div class="top-name">' + item.name + ' / ' + (item.size || '?') + '</div><div class="rotation-bar"><div class="rotation-fill" style="width:' + w + '%;background:' + col + '"></div></div><div class="top-meta" style="margin-top:3px">cout: ' + eur(item.buyPrice) + '</div></div><div class="top-roi" style="color:' + col + '">' + d + 'j</div></div>';
    });
    html += '</div>';
  }

  if (inventory.length === 0) {
    html += '<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Ajoute des paires pour voir tes analytics</div></div>';
  }
  return html;
}

function setFilter(f) { currentFilter = f; render(); }
function setSort(s) { currentSort = s; render(); }

function openModal(id) {
  if (id === 'add') {
    document.getElementById('f-name').value = '';
    document.getElementById('f-size').value = '';
    document.getElementById('f-buy').value = '';
    document.getElementById('f-date').value = getToday();
    document.getElementById('f-platform').value = '';
    document.getElementById('f-notes').value = '';
    selectedEmoji = '👟';
    buildEmojiGrid();
  }
  document.getElementById('modal-' + id).style.display = 'flex';
}
function closeModal(id) {
  document.getElementById('modal-' + id).style.display = 'none';
}

function buildEmojiGrid() {
  var html = '';
  EMOJIS.forEach(function(e){
    html += '<button class="emoji-btn ' + (e === selectedEmoji ? 'selected' : '') + '" onclick="selectEmoji(\'' + e + '\')">' + e + '</button>';
  });
  document.getElementById('emoji-grid').innerHTML = html;
}

function selectEmoji(e) {
  selectedEmoji = e;
  buildEmojiGrid();
}

function addSneaker() {
  var name = document.getElementById('f-name').value.trim();
  var buy = parseFloat(document.getElementById('f-buy').value);
  if (!name || !buy) { alert('Nom et prix requis'); return; }
  var item = {
    id: Date.now(),
    name: name,
    image: selectedEmoji,
    size: document.getElementById('f-size').value,
    buyPrice: buy,
    buyDate: document.getElementById('f-date').value || getToday(),
    platform: document.getElementById('f-platform').value,
    notes: document.getElementById('f-notes').value,
    sellPrice: null,
    sellDate: null,
    status: 'stock',
    fees: 0
  };
  inventory.unshift(item);
  saveData();
  closeModal('add');
  render();
}

function openSell(id) {
  var found = null;
  for (var i = 0; i < inventory.length; i++) {
    if (inventory[i].id === id) { found = inventory[i]; break; }
  }
  if (!found) return;
  sellTarget = found;
  document.getElementById('sell-header').innerHTML = found.image + ' <strong>' + found.name + '</strong> - achete ' + eur(found.buyPrice);
  document.getElementById('s-price').value = '';
  document.getElementById('s-fees').value = '';
  document.getElementById('s-date').value = getToday();
  document.getElementById('s-platform').value = found.platform || '';
  document.getElementById('sell-preview').style.display = 'none';
  openModal('sell');
}

function updatePreview() {
  if (!sellTarget) return;
  var sp = parseFloat(document.getElementById('s-price').value);
  var fees = parseFloat(document.getElementById('s-fees').value) || 0;
  if (!sp) { document.getElementById('sell-preview').style.display = 'none'; return; }
  var profit = sp - sellTarget.buyPrice - fees;
  var roi = (profit / sellTarget.buyPrice) * 100;
  document.getElementById('sell-preview').style.display = 'block';
  document.getElementById('prev-profit').textContent = (profit >= 0 ? '+' : '') + eur(profit);
  document.getElementById('prev-profit').style.color = roiCol(roi);
  document.getElementById('prev-roi').textContent = (roi >= 0 ? '+' : '') + roi.toFixed(0) + '%';
  document.getElementById('prev-roi').style.color = roiCol(roi);
}

function confirmSell() {
  var sp = parseFloat(document.getElementById('s-price').value);
  if (!sp || !sellTarget) { alert('Prix requis'); return; }
  for (var i = 0; i < inventory.length; i++) {
    if (inventory[i].id === sellTarget.id) {
      inventory[i].sellPrice = sp;
      inventory[i].fees = parseFloat(document.getElementById('s-fees').value) || 0;
      inventory[i].sellDate = document.getElementById('s-date').value || getToday();
      inventory[i].platform = document.getElementById('s-platform').value || inventory[i].platform;
      inventory[i].status = 'vendu';
      break;
    }
  }
  sellTarget = null;
  saveData();
  closeModal('sell');
  render();
}

function deleteItem(id) {
  if (!confirm('Supprimer cette paire ?')) return;
  inventory = inventory.filter(function(i){ return i.id !== id; });
  saveData();
  render();
}

// Init
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

loadData();
render();
</script>
</body>
</html>
